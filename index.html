<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Veterinaria - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Registro de Mascotas</h1>
        <div id="mensaje" class="mensaje oculto"></div>

        <form id="registroForm">
            <fieldset>
                <legend>Datos del Dueño</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nombre_dueno">Nombres *</label>
                        <input type="text" id="nombre_dueno" required>
                    </div>
                    <div class="form-group">
                        <label for="apellido_dueno">Apellidos *</label>
                        <input type="text" id="apellido_dueno" required>
                    </div>
                    <div class="form-group">
                        <label for="dni_dueno">DNI *</label>
                        <input type="text" id="dni_dueno" pattern="\d{8}" maxlength="8" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                    </div>
                    <div class="form-group">
                        <label for="celular">Celular *</label>
                        <input type="tel" id="celular" pattern="\d{9}" maxlength="9" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                    </div>
                    <div class="form-group">
                        <label for="correo">Correo electrónico *</label>
                        <input type="email" id="correo" required>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Datos de la Mascota</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nombre_mascota">Nombre de la mascota *</label>
                        <input type="text" id="nombre_mascota" required>
                    </div>
                    <div class="form-group">
                        <label for="edad">Edad (Años/Meses) *</label>
                        <input type="number" step="0.1" id="edad" required>
                    </div>
                    <div class="form-group">
                        <label for="peso">Peso (Kg) *</label>
                        <input type="number" step="0.1" id="peso" required>
                    </div>
                    <div class="form-group">
                        <label for="especie_id">Especie *</label>
                        <select id="especie_id" required><option value="">Cargando...</option></select>
                    </div>
                    <div class="form-group">
                        <label for="raza_id">Raza *</label>
                        <select id="raza_id" required><option value="">Cargando...</option></select>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Atención Médica</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="tipo_atencion_id">Tipo de atención *</label>
                        <select id="tipo_atencion_id" required><option value="">Cargando...</option></select>
                    </div>
                    <div class="form-group">
                        <label for="condicion_medica_id">Condición médica *</label>
                        <select id="condicion_medica_id" required><option value="">Cargando...</option></select>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label for="observaciones">Observaciones adicionales</label>
                    <textarea id="observaciones" rows="2"></textarea>
                </div>
            </fieldset>

            <button type="submit" id="btnRegistrar">Registrar Paciente</button>
        </form>

        <hr style="margin: 3rem 0; border: none; border-top: 2px dashed #cbd5e1;">

        <div class="listado-section">
            <h2>Mascotas Registradas</h2>
            
            <div class="filtro-container">
                <label for="filtro_especie">Filtrar por Especie:</label>
                <select id="filtro_especie">
                    <option value="">Todas las especies</option>
                </select>
            </div>

            <div class="table-responsive">
                <table class="mascotas-table">
                    <thead>
                        <tr>
                            <th>Mascota</th>
                            <th>Edad</th>
                            <th>Peso</th>
                            <th>Dueño</th>
                            <th>DNI Dueño</th>
                            <th>Celular</th>
                            <th>Especie</th>
                            <th>Raza</th>
                            <th>Atención</th>
                            <th>Condición</th>
                        </tr>
                    </thead>
                    <tbody id="contenedor_lista">
                        <tr>
                            <td colspan="10" style="text-align: center; color: #64748b;">Cargando registros...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
